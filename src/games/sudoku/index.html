<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Play free online Sudoku Zen — six difficulties from Easy to Extreme, notes, undo, hint, mistake limit.">
  <meta name="theme-color" content="#4a5fc1">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1735197115961712" crossorigin="anonymous"></script>
  <link rel="canonical" href="https://minimalist-games.com/games/sudoku">
  <title>Sudoku Zen — Free online Sudoku · Minimalist Games</title>
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Minimalist Games">
  <meta property="og:title" content="Sudoku Zen — Free online Sudoku">
  <meta property="og:description" content="Six difficulties from Easy to Extreme, notes, undo, hint. Minimalist Sudoku, no clutter, no accounts.">
  <meta property="og:url" content="https://minimalist-games.com/games/sudoku">
  <meta property="og:image" content="https://minimalist-games.com/public/og-image.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Sudoku Zen — Free online Sudoku">
  <meta name="twitter:description" content="Six difficulties, notes, undo, hint. No accounts.">
  <meta name="twitter:image" content="https://minimalist-games.com/public/og-image.svg">
  <link rel="icon" type="image/svg+xml" href="/public/favicon.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/public/icon-192.svg">
  <link rel="stylesheet" href="/src/css/global.css">
  <link rel="stylesheet" href="/src/css/responsive.css">
  <link rel="stylesheet" href="/src/games/sudoku/sudoku.css">
  <script src="/src/js/analytics.js" defer></script>
  <script src="/src/js/sw-register.js" defer></script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Game",
    "name": "Sudoku Zen",
    "description": "Free online Sudoku with six difficulty levels: Easy, Medium, Hard, Expert, Master, Extreme.",
    "url": "https://minimalist-games.com/games/sudoku",
    "image": "https://minimalist-games.com/public/og-image.svg",
    "genre": "Logic puzzle",
    "applicationCategory": "Game",
    "operatingSystem": "Web browser",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>
</head>
<body>
  <main class="sudoku-page" data-sudoku>
    <header class="page-header">
      <a href="/" class="back-btn" aria-label="Back to home">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </a>
      <h1>Sudoku Zen</h1>
    </header>

    <div class="ad-slot ad-slot-top" role="complementary" aria-label="Advertisement">
      <span class="ad-label">Advertisement</span>
      <div class="ad-unit ad-728x90">Ad space · 728×90</div>
    </div>

    <aside class="side-ad side-ad-left" aria-label="Advertisement" role="complementary">
      <span class="ad-label">Advertisement</span>
      <div class="ad-unit ad-160x600">Ad space · 160×600</div>
    </aside>
    <aside class="side-ad side-ad-right" aria-label="Advertisement" role="complementary">
      <span class="ad-label">Advertisement</span>
      <div class="ad-unit ad-160x600">Ad space · 160×600</div>
    </aside>

    <div class="sudoku-layout">
      <section class="board-column">
        <nav class="difficulty-bar" aria-label="Difficulty">
          <span class="difficulty-label">Difficulty:</span>
          <button class="difficulty-btn is-active" data-difficulty="easy">Easy</button>
          <button class="difficulty-btn" data-difficulty="medium">Medium</button>
          <button class="difficulty-btn" data-difficulty="hard">Hard</button>
          <button class="difficulty-btn" data-difficulty="expert">Expert</button>
          <button class="difficulty-btn" data-difficulty="master">Master</button>
          <button class="difficulty-btn" data-difficulty="extreme">Extreme</button>
        </nav>

        <div class="board-frame">
          <div class="grid" data-grid role="application" aria-label="Sudoku board"></div>
          <div class="pause-overlay" data-pause-overlay hidden>
            <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor" aria-hidden="true"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
            <p>Paused</p>
          </div>
        </div>
      </section>

      <aside class="panel-column">
        <div class="panel-head">
          <div class="stat">
            <span class="stat-label">Mistakes</span>
            <span class="stat-value" data-mistakes>0/3</span>
          </div>
          <div class="stat stat-counter">
            <span class="stat-value big" data-counter>0</span>
          </div>
          <div class="stat stat-right">
            <span class="stat-label">Time</span>
            <span class="stat-value" data-timer>00:00</span>
          </div>
          <button class="icon-btn small" data-action="pause" aria-label="Pause timer">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
          </button>
        </div>

        <div class="action-row">
          <button class="icon-btn" data-action="undo" aria-label="Undo">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
          <button class="icon-btn" data-action="erase" aria-label="Erase" title="Erase">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
          </button>
          <button class="icon-btn has-indicator" data-action="notes" aria-label="Notes mode: off">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
            <span class="indicator" data-notes-state>OFF</span>
          </button>
          <button class="icon-btn has-badge" data-action="hint" aria-label="Hint, 3 left">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.7.6 1 1.4 1 2.3v1h6v-1c0-.9.3-1.7 1-2.3A7 7 0 0 0 12 2z"/></svg>
            <span class="badge" data-hints-left>3</span>
          </button>
        </div>

        <div class="number-pad" aria-label="Number pad">
          <button class="pad-btn" data-num="1">1</button>
          <button class="pad-btn" data-num="2">2</button>
          <button class="pad-btn" data-num="3">3</button>
          <button class="pad-btn" data-num="4">4</button>
          <button class="pad-btn" data-num="5">5</button>
          <button class="pad-btn" data-num="6">6</button>
          <button class="pad-btn" data-num="7">7</button>
          <button class="pad-btn" data-num="8">8</button>
          <button class="pad-btn" data-num="9">9</button>
        </div>

        <button class="new-game-btn" data-action="new">New Game</button>
      </aside>
    </div>

    <div class="ad-slot" role="complementary" aria-label="Advertisement">
      <span class="ad-label">Advertisement</span>
      <div class="ad-unit ad-728x90">Ad space · 728×90</div>
    </div>

    <footer class="game-footer">
      <a href="/">Home</a>
      <span aria-hidden="true">·</span>
      <a href="/blog">Blog</a>
      <span aria-hidden="true">·</span>
      <a href="/privacy">Privacy</a>
      <span aria-hidden="true">·</span>
      <a href="/terms">Terms</a>
    </footer>

    <div class="modal" data-modal hidden role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-card">
        <h2 id="modal-title" data-modal-title>Solved!</h2>
        <p data-modal-msg>Nice work.</p>
        <div class="time" data-modal-time>00:00</div>
        <button class="new-game-btn" data-modal-close>New Game</button>
      </div>
    </div>
  </main>

  <script src="/src/games/sudoku/sudoku.js"></script>
</body>
</html>
